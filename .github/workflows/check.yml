name: check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install zsh and shellcheck (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zsh shellcheck

      - name: Install zsh and shellcheck (macos)
        if: runner.os == 'macOS'
        run: brew install zsh shellcheck

      - name: zsh syntax
        run: zsh -n zellij-ssh-login.zsh

      - name: sh syntax
        run: |
          sh -n install.sh
          sh -n uninstall.sh
          sh -n zellij-login-preview.sh
          sh -n zellij-login-action.sh
          sh -n test/roundtrip.sh

      - name: shellcheck
        run: |
          shellcheck --shell=sh \
            install.sh uninstall.sh \
            zellij-login-preview.sh zellij-login-action.sh \
            test/roundtrip.sh

      - name: sandbox round-trip (skips zellij/fzf checks via warnings)
        run: sh test/roundtrip.sh
